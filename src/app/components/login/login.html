<div class="container-fluid d-flex justify-content-center align-items-center bg-light vh-100">

  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">

    <div class="text-center mb-4">
      <h3 class="text-primary fw-bold">Yumaste Admin</h3>
      <p class="text-muted">Inserisci le tue credenziali per accedere</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-control"
          placeholder="admin@yumaste.it"
          [(ngModel)]="credentials.email"
          required>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label fw-semibold">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="Inserisci la password"
          [(ngModel)]="credentials.password"
          required>
      </div>

      <button
        type="submit"
        class="btn btn-primary w-100 fw-bold"
        [disabled]="!loginForm.valid">
        Accedi
      </button>

    </form>
  </div>
</div>
